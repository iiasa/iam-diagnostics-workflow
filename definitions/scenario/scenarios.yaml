# Mandatory scenarios
- Current-Policies:
    description: The default current climate policy reference scenario. Only
                implemented policies should be included, not targets that are
                not supported by policies (e.g. NDC). Climate policies can be
                explicitly modelled (preferably) or represented by a carbon price.
                If neither option is available, model teams can use their
                default No-Policybaseline. If a scenario deviates from CP,
                a description of the scenario assumptions should be provided.
- C400-lin:
    description: Linearly increasing carbon price starting in 2030 with $35, yielding $400 in 2050
- C160-gr5:
    description: Exponentially increasing carbon price, starting in 2030 with $160, with a 5% growth rate
- C80-gr5:
    description: Exponentially increasing carbon price, starting in 2030 with $80, with a 5% growth rate
- C0to400-lin:
    description: Same as C400-lin from 2050 onward (shock from $0 to $400 in 2050)

# Lim variants
- C400-lin-LimBio:
    description: As in C400-lin, but with limits on bioenergy supply
- C400-lin-LimCCS:
    description: As in C400-lin, but with limits on CCS
- C400-lin-LimCDR:
    description: As in C400-lin, but with limits on CDR

# Other optional ones
- C400-lin-Diet:
    description: As in C400-lin, but additionally an implementation of the EAT-Lancet diet 2 implemented from 2025 to 2070.
- C400-lin-BiodivProt:
    description: As in LinearPrice-400, with land use protection for biodiversity implemented from 2030 to 2100 (30%).
- C400-lin-Policies:
    description: As in LinearPrice-400, plus all non-carbon price related policies or modeling switches that modelling teams have to get to lowest temperature stabilization.
- No-Policy:
    description: Counterfactual scenario with no climate policies and no carbon prices.

