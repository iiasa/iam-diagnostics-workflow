- Policy Cost|Additional Total Energy System Cost:
    description: Additional annual total energy system cost above a baseline scenario
    unit: billion USD_2010/yr
- Policy Cost|Area under MAC Curve:
    description: Total annual costs of mitigation policy computed as the area under the
      Marginal Abatement Cost (MAC) curve
    unit: billion USD_2010/yr
- Policy Cost|Consumption Loss:
    description: Annual consumption loss in a policy scenario relative to a
      corresponding baseline scenario
    unit: billion USD_2010/yr
    lower_bound: 0
    note: Consumption loss should be reported as a positive value
