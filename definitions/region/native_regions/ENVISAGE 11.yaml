# The model documentation and regional aggregation for Envisage V11.0 can be found at https://github.com/mensbrugghe/Env11/blob/main/Doc/Env11.pdf
# The default aggregation (of the GTAP Data Base) is all of G20 plus remaining countries grouped geographically.
# The mappings are based on Version 12 of the GTAP Data Base.
# N.B. There are 19 countries in the G20--the 20th member is the European Union
